<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Market Digit Engine</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0F1117;color:#fff}
.container{padding:15px}
.card{background:#1A1F2B;padding:15px;border-radius:14px;margin-bottom:15px}
input{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;background:#0F1117;color:white}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.run{background:#0066ff;color:#fff}
.stop{background:#ff0033;color:#fff}
.status{font-weight:bold}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>Bot Control</h3>
<input type="number" id="stake" value="1" placeholder="Base Stake">
<input type="number" id="tp" placeholder="Take Profit (USD)">
<input type="number" id="sl" placeholder="Stop Loss (USD)">
<button id="toggle" class="run">RUN</button>
<p>Status: <span id="status">STOPPED</span></p>
<p>Active Market: <span id="market">None</span></p>
<p>Profit: <span id="profit">0</span></p>
<p>Martingale Step: <span id="step">0</span></p>
</div>

</div>

<script>
const TOKEN = "PASTE_YOUR_DERIV_TOKEN";
const APP_ID = 1089;

const markets = [
"R_10","R_25","R_50","R_75","R_100",
"R_10_1S","R_25_1S","R_50_1S","R_75_1S","R_100_1S"
];

let ws;
let running=false;
let buffers={};
let currentStake;
let baseStake;
let martingaleStep=0;
let maxSteps=4;
let totalProfit=0;
let activeMarket=null;
let lastTradeType=null;
let contractId=null;

markets.forEach(m=>{
buffers[m]={b50:[],b100:[],b300:[]};
});

document.getElementById("toggle").onclick=()=>{
running=!running;

if(running){
start();
}else{
stopBot("Manual Stop");
}
};

function start(){
baseStake=parseFloat(document.getElementById("stake").value);
currentStake=baseStake;
martingaleStep=0;
totalProfit=0;

ws=new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:TOKEN}));
};

ws.onmessage=(msg)=>{
let data=JSON.parse(msg.data);

if(data.msg_type==="authorize"){
subscribeAll();
}

if(data.msg_type==="tick"){
handleTick(data);
}

if(data.msg_type==="proposal"){
ws.send(JSON.stringify({buy:data.proposal.id,price:currentStake}));
}

if(data.msg_type==="proposal_open_contract"){
handleResult(data.proposal_open_contract);
}
};

document.getElementById("status").innerText="RUNNING";
}

function stopBot(reason){
running=false;
if(ws) ws.close();
document.getElementById("status").innerText="STOPPED";
console.log("Bot stopped:",reason);
}

function subscribeAll(){
markets.forEach(m=>{
ws.send(JSON.stringify({ticks:m,subscribe:1}));
});
}

function handleTick(data){
if(!running) return;

let market=data.echo_req.ticks;
let price=data.tick.quote;
let digit=parseInt(price.toString().slice(-1));

updateBuffers(market,digit);

scanMarkets();
}

function updateBuffers(market,digit){
let buf=buffers[market];

buf.b50.push(digit);
buf.b100.push(digit);
buf.b300.push(digit);

if(buf.b50.length>50) buf.b50.shift();
if(buf.b100.length>100) buf.b100.shift();
if(buf.b300.length>300) buf.b300.shift();
}

function deviation(buffer,type){
if(buffer.length===0) return 0;

let count;

if(type==="OVER2")
count=buffer.filter(d=>d>2).length;
else
count=buffer.filter(d=>d<7).length;

let ratio=count/buffer.length;
return (ratio-0.7);
}

function scoreMarket(market,type){
let buf=buffers[market];

if(buf.b300.length<300) return 0;

let s50=deviation(buf.b50,type)*0.5;
let s100=deviation(buf.b100,type)*0.3;
let s300=deviation(buf.b300,type)*0.2;

return s50+s100+s300;
}

function scanMarkets(){
if(contractId) return;

let bestScore=0;
let bestMarket=null;
let bestType=null;

markets.forEach(m=>{
let overScore=scoreMarket(m,"OVER2");
let underScore=scoreMarket(m,"UNDER7");

if(overScore>bestScore){
bestScore=overScore;
bestMarket=m;
bestType="OVER2";
}
if(underScore>bestScore){
bestScore=underScore;
bestMarket=m;
bestType="UNDER7";
}
});

if(bestScore>0.02){
activeMarket=bestMarket;
lastTradeType=bestType;
document.getElementById("market").innerText=activeMarket;
executeTrade(bestMarket,bestType);
}
}

function executeTrade(market,type){
let contractType, barrier;

if(type==="OVER2"){
contractType="DIGITOVER";
barrier=2;
}else{
contractType="DIGITUNDER";
barrier=7;
}

ws.send(JSON.stringify({
proposal:1,
amount:currentStake,
basis:"stake",
contract_type:contractType,
currency:"USD",
duration:1,
duration_unit:"t",
symbol:market,
barrier:barrier
}));

contractId=true;
}

function handleResult(contract){
if(contract.is_sold!==1) return;

contractId=null;

let profit=parseFloat(contract.profit);
totalProfit+=profit;

document.getElementById("profit").innerText=totalProfit.toFixed(2);

let tp=parseFloat(document.getElementById("tp").value)||Infinity;
let sl=parseFloat(document.getElementById("sl").value)||Infinity;

if(totalProfit>=tp) return stopBot("Take Profit Hit");
if(totalProfit<=-sl) return stopBot("Stop Loss Hit");

if(profit<0){
martingaleStep++;

if(martingaleStep>=maxSteps){
return stopBot("Max Martingale Reached");
}

currentStake*=2.2;

if(lastTradeType==="OVER2")
executeRecovery("DIGITOVER",3);
else
executeRecovery("DIGITUNDER",6);

}else{
martingaleStep=0;
currentStake=baseStake;
}

document.getElementById("step").innerText=martingaleStep;
}

function executeRecovery(contractType,barrier){
ws.send(JSON.stringify({
proposal:1,
amount:currentStake,
basis:"stake",
contract_type:contractType,
currency:"USD",
duration:1,
duration_unit:"t",
symbol:activeMarket,
barrier:barrier
}));

contractId=true;
}
</script>

</body>
</html>
