<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Connection Test</title>
<style>
body{background:#0a0f1e;color:#f1f5f9;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;text-align:center;}
button{padding:14px 28px;background:#38bdf8;border:none;border-radius:10px;color:#000;font-size:15px;font-weight:700;cursor:pointer;margin:6px;width:300px;}
#log{margin-top:20px;width:300px;text-align:left;}
.line{padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:13px;}
.ok{background:rgba(34,197,94,.2);border:1px solid #22c55e;color:#22c55e;}
.err{background:rgba(239,68,68,.2);border:1px solid #ef4444;color:#ef4444;}
.info{background:rgba(56,189,248,.2);border:1px solid #38bdf8;color:#38bdf8;}
</style>
</head>
<body>
<h2>DerivAI Connection Test</h2>
<p style="color:#94a3b8;margin-bottom:20px;">Testing all connection methods</p>
<button onclick="runAll()">RUN ALL TESTS</button>
<div id="log"></div>
<script>
function log(msg, type) {
  var d = document.createElement('div');
  d.className = 'line ' + (type||'info');
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
}
function runAll() {
  document.getElementById('log').innerHTML = '';
  log('Starting tests...', 'info');
  // Test 1: JS
  log('TEST 1: JS is working ✓', 'ok');
  // Test 2: Try each app ID
  var ids = [36544, 16929, 1169, 1089];
  var idx = 0;
  function tryNext() {
    if (idx >= ids.length) {
      log('All app IDs tested', 'info');
      return;
    }
    var id = ids[idx++];
    log('TEST ' + (idx+1) + ': Trying app_id=' + id + '...', 'info');
    var ws;
    try { ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=' + id); }
    catch(e) { log('app_id=' + id + ' ERROR: ' + e.message, 'err'); tryNext(); return; }
    var done = false;
    var t = setTimeout(function(){ if(!done){done=true;log('app_id='+id+' TIMEOUT','err');try{ws.close();}catch(e){}tryNext();}}, 8000);
    ws.onopen = function(){ ws.send(JSON.stringify({ping:1})); };
    ws.onmessage = function(e){
      if(done)return; done=true; clearTimeout(t);
      var d=JSON.parse(e.data);
      log('app_id=' + id + ' WORKS ✓ Response: ' + JSON.stringify(d), 'ok');
      try{ws.close();}catch(ex){}
      tryNext();
    };
    ws.onerror = function(){ if(done)return; };
    ws.onclose = function(ev){
      if(done)return; done=true; clearTimeout(t);
      log('app_id=' + id + ' CLOSED: code=' + ev.code, 'err');
      tryNext();
    };
  }
  tryNext();
}
</script>
</body>
</html>
