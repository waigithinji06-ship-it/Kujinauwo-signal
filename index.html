<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deriv Smart Bot</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

#log {
  margin-top: 20px;
  background: #111827;
  padding: 10px;
  height: 200px;
  overflow-y: auto;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>🚀 Deriv Smart Trading Bot</h2>

<input type="text" id="token" placeholder="Enter API Token">
<br>
<button onclick="start()">▶ Start</button>
<button onclick="stop()">■ Stop</button>

<div id="log"></div>

<script>
// =====================
// CONNECTION
// =====================
let ws;
let authorized = false;

function log(msg) {
  document.getElementById("log").innerHTML += msg + "<br>";
}

function start() {
  let token = document.getElementById("token").value;

  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    log("Connecting...");
    ws.send(JSON.stringify({ authorize: token }));
  };

  ws.onmessage = (msg) => {
    let data = JSON.parse(msg.data);

    if (data.msg_type === "authorize") {
      if (data.error) {
        log("❌ Login failed");
      } else {
        authorized = true;
        log("✅ Authorized");
        subscribeTicks();
      }
    }

    if (data.msg_type === "tick") {
      handleTick(data.tick.quote);
    }

    if (data.msg_type === "buy") {
      log("📥 Trade placed");
    }

    if (data.msg_type === "proposal_open_contract") {
      if (data.proposal_open_contract.is_sold) {
        let profit = data.proposal_open_contract.profit;
        updateResult(profit);
      }
    }
  };
}

// =====================
// TICKS
// =====================
function subscribeTicks() {
  ws.send(JSON.stringify({
    ticks: "R_100"
  }));
}

let history = [];

function handleTick(price) {
  let digit = parseInt(price.toString().slice(-1));
  history.push(digit);

  if (history.length > 50) history.shift();

  if (canTrade() && shouldTrade()) {
    trade(digit);
  }
}

// =====================
// FILTER
// =====================
function shouldTrade() {
  let last = history.slice(-20);

  let high = last.filter(d => d >= 7).length;
  let low = last.filter(d => d <= 2).length;

  return !(high > 14 || low > 14);
}

// =====================
// STRATEGY
// =====================
let stake = 1;
let lossStreak = 0;
let lastTrade = 0;

function trade(digit) {
  if (!authorized) return;

  let type;

  if (digit <= 2) type = "DIGITOVER";
  else if (digit >= 7) type = "DIGITUNDER";
  else return;

  lastTrade = Date.now();

  ws.send(JSON.stringify({
    buy: 1,
    price: stake,
    parameters: {
      amount: stake,
      basis: "stake",
      contract_type: type,
      currency: "USD",
      duration: 1,
      duration_unit: "t",
      symbol: "R_100"
    }
  }));

  log("📊 Trade: " + type + " | Stake: " + stake);
}

// =====================
// RISK CONTROL
// =====================
function updateResult(profit) {
  if (profit < 0) {
    lossStreak++;
    stake *= 3.5;
    log("❌ Loss | New Stake: " + stake);
  } else {
    lossStreak = 0;
    stake = 1;
    log("✅ Win | Reset Stake");
  }

  if (lossStreak >= 4) {
    log("🛑 Stopped (3 losses)");
    stop();
  }
}

// =====================
// CONTROL
// =====================
function canTrade() {
  return (Date.now() - lastTrade) > 5000;
}

function stop() {
  if (ws) ws.close();
  log("Bot stopped");
}
</script>

</body>
</html>
