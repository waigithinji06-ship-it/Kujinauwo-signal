<!DOCTYPE html>
<html>
<head>
  <title>Business Management System</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, button, select { margin: 5px; padding: 5px; }
    .hidden { display: none; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>

<body>

<h2>🔐 Login</h2>
<div id="login">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

<h2>📦 Inventory</h2>
<div class="card">
  <input id="pname" placeholder="Product Name">
  <input id="pprice" placeholder="Selling Price">
  <button onclick="addProduct()">Add Product</button>
</div>

<ul id="productList"></ul>

<h2>📥 Purchases (Stock In)</h2>
<div class="card">
  <select id="purchaseProduct"></select>
  <input id="purchaseQty" placeholder="Quantity">
  <input id="purchaseCost" placeholder="Cost Price">
  <button onclick="addPurchase()">Add Purchase</button>
</div>

<h2>🛒 Sales</h2>
<div class="card">
  <select id="saleProduct"></select>
  <input id="saleQty" placeholder="Quantity">
  <button onclick="addToCart()">Add to Cart</button>
</div>

<ul id="cart"></ul>
<button onclick="checkout()">Checkout</button>

<h2>👤 Customers</h2>
<div class="card">
  <input id="cname" placeholder="Customer Name">
  <button onclick="addCustomer()">Add Customer</button>
</div>

<ul id="customers"></ul>

<h2>💳 Lipa Pole Pole</h2>
<div class="card">
  <select id="debtCustomer"></select>
  <input id="debtAmount" placeholder="Amount">
  <button onclick="addDebt()">Add Debt</button>
</div>

<ul id="debts"></ul>

<h2>📊 Reports</h2>
<div id="reports"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];
let sales = JSON.parse(localStorage.getItem('sales')) || [];
let purchases = JSON.parse(localStorage.getItem('purchases')) || [];
let customers = JSON.parse(localStorage.getItem('customers')) || [];
let debts = JSON.parse(localStorage.getItem('debts')) || [];
let cart = [];

function saveAll() {
  localStorage.setItem('products', JSON.stringify(products));
  localStorage.setItem('sales', JSON.stringify(sales));
  localStorage.setItem('purchases', JSON.stringify(purchases));
  localStorage.setItem('customers', JSON.stringify(customers));
  localStorage.setItem('debts', JSON.stringify(debts));
}

function login() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  render();
}

function addProduct() {
  let name = pname.value;
  let price = Number(pprice.value);
  products.push({ id: Date.now(), name, price, stock: 0 });
  saveAll(); render();
}

function render() {
  productList.innerHTML = products.map(p => 
    `<li>${p.name} | Stock: ${p.stock}</li>`).join('');

  purchaseProduct.innerHTML = saleProduct.innerHTML =
    products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

  customersList();
  reportsView();
}

function addPurchase() {
  let id = Number(purchaseProduct.value);
  let qty = Number(purchaseQty.value);
  let cost = Number(purchaseCost.value);

  let p = products.find(x => x.id === id);
  p.stock += qty;

  purchases.push({ id: Date.now(), productId: id, qty, cost });
  saveAll(); render();
}

function addToCart() {
  let id = Number(saleProduct.value);
  let qty = Number(saleQty.value);

  let p = products.find(x => x.id === id);
  if (p.stock < qty) return alert("Not enough stock");

  cart.push({ id, qty, price: p.price });
  cartView();
}

function cartView() {
  cart.innerHTML = cart.map(c => `<li>${c.qty}</li>`).join('');
}

function checkout() {
  let total = 0;

  cart.forEach(c => {
    let p = products.find(x => x.id === c.id);
    p.stock -= c.qty;
    total += c.qty * c.price;
  });

  sales.push({ id: Date.now(), total });
  cart = [];
  saveAll(); render();
}

function addCustomer() {
  customers.push({ id: Date.now(), name: cname.value });
  saveAll(); render();
}

function customersList() {
  customers.innerHTML = customers.map(c => `<li>${c.name}</li>`).join('');
  debtCustomer.innerHTML = customers.map(c => 
    `<option value="${c.id}">${c.name}</option>`).join('');
}

function addDebt() {
  debts.push({
    id: Date.now(),
    customerId: Number(debtCustomer.value),
    amount: Number(debtAmount.value)
  });
  saveAll(); render();
}

function reportsView() {
  let totalSales = sales.reduce((a, b) => a + b.total, 0);
  let totalPurchases = purchases.reduce((a, b) => a + (b.qty * b.cost), 0);

  reports.innerHTML = `
    <p>Total Sales: ${totalSales}</p>
    <p>Total Purchases: ${totalPurchases}</p>
    <p>Profit: ${totalSales - totalPurchases}</p>
  `;
}

render();
</script>

</body>
</html>
