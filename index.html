<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login Test</title>
<style>
body{background:#0a0f1e;color:#f1f5f9;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;}
.box{width:100%;max-width:380px;background:#151d2e;border:1px solid #1f2d45;border-radius:16px;padding:24px;}
h2{color:#38bdf8;margin-bottom:20px;text-align:center;}
input{width:100%;padding:12px;background:#111827;border:1px solid #1f2d45;border-radius:8px;color:#f1f5f9;font-size:14px;margin-bottom:12px;box-sizing:border-box;outline:none;}
button{width:100%;padding:13px;background:#ef4444;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;}
button.guest{background:transparent;border:1px solid #1f2d45;color:#94a3b8;}
#msg{padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px;display:none;}
#msg.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;}
#msg.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;}
#msg.info{background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.3);color:#38bdf8;}
#app{display:none;text-align:center;padding:20px;}
#app h2{color:#22c55e;}
</style>
</head>
<body>

<div id="loginBox" class="box">
  <h2>DerivAI Login Test</h2>
  <div id="msg"></div>
  <input id="tok" type="password" placeholder="Paste API token here..."/>
  <button id="btnConnect" onclick="doConnect()">CONNECT TO DERIV</button>
  <button class="guest" onclick="doGuest()">Continue without token</button>
</div>

<div id="app">
  <h2>&#10003; LOGIN WORKING</h2>
  <p style="color:#94a3b8;margin-bottom:20px;" id="appMsg">Connected successfully</p>
  <button onclick="doLogout()" style="background:#1f2d45;border:none;border-radius:8px;color:#94a3b8;padding:10px 20px;cursor:pointer;">Logout</button>
</div>

<script>
function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
}

function setBtn(text, disabled) {
  var btn = document.getElementById('btnConnect');
  btn.textContent = text;
  btn.disabled = disabled;
  btn.style.opacity = disabled ? '0.6' : '1';
}

function showApp(message) {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('appMsg').textContent = message;
}

function doLogout() {
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  document.getElementById('tok').value = '';
  document.getElementById('msg').style.display = 'none';
  setBtn('CONNECT TO DERIV', false);
}

function doGuest() {
  showApp('Guest mode - analysis only. No token used.');
}

function doConnect() {
  var token = document.getElementById('tok').value.trim();

  if (!token) {
    showMsg('Please paste your API token first', 'err');
    return;
  }

  if (token.length < 10) {
    showMsg('Token too short - make sure you copied the full token', 'err');
    return;
  }

  showMsg('Opening connection...', 'info');
  setBtn('CONNECTING...', true);

  var socket;
  var done = false;

  try {
    socket = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
  } catch (e) {
    showMsg('ERROR: Cannot open WebSocket - ' + e.message, 'err');
    setBtn('CONNECT TO DERIV', false);
    return;
  }

  var timeout = setTimeout(function() {
    if (done) return;
    done = true;
    try { socket.close(); } catch(e) {}
    showMsg('Timed out after 15 seconds. Check your internet connection.', 'err');
    setBtn('CONNECT TO DERIV', false);
  }, 15000);

  socket.onopen = function() {
    showMsg('Connected to Deriv. Authorizing token...', 'info');
    setBtn('AUTHORIZING...', true);
    socket.send(JSON.stringify({ authorize: token }));
  };

  socket.onmessage = function(event) {
    var data;
    try { data = JSON.parse(event.data); } catch(e) { return; }

    if (data.msg_type !== 'authorize') return;

    clearTimeout(timeout);
    done = true;
    try { socket.close(); } catch(e) {}

    if (data.error) {
      showMsg('Token rejected: ' + (data.error.message || 'Invalid token. Check it has Read + Trade scope.'), 'err');
      setBtn('CONNECT TO DERIV', false);
      return;
    }

    var auth = data.authorize;
    var name = auth.fullname || auth.email || 'Trader';
    var balance = auth.balance !== undefined ? parseFloat(auth.balance).toFixed(2) : '--';
    var currency = auth.currency || 'USD';
    var acctType = auth.is_virtual ? 'Demo' : 'Real';
    showApp('Welcome ' + name + ' | Balance: ' + currency + ' ' + balance + ' (' + acctType + ')');
  };

  socket.onerror = function() {
    if (done) return;
    clearTimeout(timeout);
    done = true;
    try { socket.close(); } catch(e) {}
    showMsg('Connection error. Check your internet and try again.', 'err');
    setBtn('CONNECT TO DERIV', false);
  };

  socket.onclose = function() {
    if (done) return;
    clearTimeout(timeout);
    done = true;
    showMsg('Connection closed unexpectedly. Try again.', 'err');
    setBtn('CONNECT TO DERIV', false);
  };
}
</script>

</body>
</html>
