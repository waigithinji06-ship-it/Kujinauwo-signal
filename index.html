<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS RUAH HOME — Fixed</title>

<style>
:root{
  --bg:#0a0c10;
  --bg2:#11151c;
  --text:#e8e6e0;
  --gold:#c9a84c;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:var(--bg2);
  padding:30px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--gold);
  cursor:pointer;
  font-weight:bold;
}

.role-tab{
  display:inline-block;
  padding:6px 10px;
  margin-bottom:10px;
  cursor:pointer;
  background:#222;
}

.role-tab.active{
  background:var(--gold);
  color:black;
}

#error{
  color:red;
  display:none;
}

/* APP */
#app{
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Login</h2>

    <div>
      <span class="role-tab active" id="rtab-manager" onclick="selRole('manager')">Manager</span>
      <span class="role-tab" id="rtab-sales" onclick="selRole('sales')">Sales</span>
    </div>

    <input id="lUser" placeholder="Username">
    <input id="lPass" type="password" placeholder="Password">

    <button onclick="doLogin()">Sign In</button>
    <div id="error">Invalid login</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <h1>✅ System Loaded Successfully</h1>
  <p>You are logged in.</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
// DEFAULT USERS
const DEFAULTS = {
  credentials:{
    manager:{user:'manager',pass:'1234'},
    sales:{user:'sales',pass:'1234'}
  }
};

let DB = {};
let role = "manager";

// INIT
function init(){
  try{
    let raw = localStorage.getItem("jsruah_v2");
    DB = raw ? JSON.parse(raw) : DEFAULTS;

    if(!DB.credentials){
      DB = DEFAULTS;
      save();
    }
  }catch(e){
    DB = DEFAULTS;
    save();
  }
}

function save(){
  localStorage.setItem("jsruah_v2", JSON.stringify(DB));
}

// ROLE SWITCH
function selRole(r){
  role = r;
  document.querySelectorAll(".role-tab").forEach(el=>el.classList.remove("active"));
  document.getElementById("rtab-"+r).classList.add("active");
}

// LOGIN
function doLogin(){
  let u = document.getElementById("lUser").value.trim();
  let p = document.getElementById("lPass").value.trim();

  let c = DB.credentials[role];

  if(u === c.user && p === c.pass){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("error").style.display="block";
  }
}

// LOGOUT
function logout(){
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("app").style.display="none";
}

// START
init();
</script>

</body>
</html>
